async function loadFromDB(){
  try {
    var results = await Promise.all([
      db.from('meals').select('*'),
      db.from('week_plan').select('*, meals(*)'),
      db.from('history').select('*').order('saved_at',{ascending:false}).limit(10),
    ]);
    var mealsRes=results[0], weekRes=results[1], histRes=results[2];
    meals = mealsRes.data&&mealsRes.data.length ? mealsRes.data : [];
    if(!meals.length) await seedMeals();
    week = {};
    DAYS.forEach(function(d){ week[d]={meal:null,sides:[]}; });
    if(weekRes.data) weekRes.data.forEach(function(row){ week[row.day]={meal:row.meals||null,sides:row.sides||[]}; });
    history = histRes.data||[];
    setSynced(); renderAll();
  } catch(e){ console.error(e); setError(); DAYS.forEach(function(d){ week[d]={meal:null,sides:[]}; }); renderAll(); }
}

function startTouchSelect(item,type){
  touchSelected=item; touchType=type;
  document.getElementById('touch-banner-text').textContent=type==='meal'?'"'+item.name+'" — tap a day to assign':'"'+item.name+'" — tap a day\'s sides strip';
  document.getElementById('touch-banner').classList.add('visible');
  renderWeekGrid(); renderLib();
}
function cancelTouchSelect(){
  touchSelected=null; touchType=null;
  document.getElementById('touch-banner').classList.remove('visible');
  renderWeekGrid(); renderLib();
}
async function assignTouchToDay(day,zone){
  if(!touchSelected) return;
  if(!week[day]) week[day]={meal:null,sides:[]};
  if(zone==='meal'&&touchType==='meal'){ week[day].meal=touchSelected; }
  else if(zone==='side'&&touchType==='ingredient'){
    if(!week[day].sides.some(function(s){ return s.id===touchSelected.id; })) week[day].sides.push(touchSelected);
  } else { return; }
  cancelTouchSelect(); renderAll(); await saveDayToDB(day); showToast('Assigned! 🍽️');
}

function renderSearch(){
  var q=(document.getElementById('meal-search').value||'').toLowerCase().trim();
  document.getElementById('search-clear-btn').style.display=q?'':'none';
  var resultsEl=document.getElementById('search-results');
  if(!q){ resultsEl.innerHTML=''; return; }
  var assignedMeals=new Set(DAYS.map(function(d){ return week[d]&&week[d].meal?week[d].meal.id:null; }).filter(Boolean));
  var mealMatches=meals.filter(function(m){ return m.name.toLowerCase().includes(q)||getCuisine(m.cuisine).label.toLowerCase().includes(q); });
  var ingMatches=ingredients.filter(function(i){ return i.name.toLowerCase().includes(q)||(ING_CATS[i.cat]||'').toLowerCase().includes(q); });
  if(!mealMatches.length&&!ingMatches.length){ resultsEl.innerHTML='<div class="search-results"><div class="search-empty">Nothing found</div></div>'; return; }
  var touch=isTouchDevice();
  var rows=[];
  mealMatches.forEach(function(m){
    var used=assignedMeals.has(m.id); var c=getCuisine(m.cuisine);
    rows.push('<div class="search-result-item '+(used?'used':'')+'"'
      +(!used?' draggable="true" ondragstart="startDrag(\''+m.id+'\',\'meal\')" ondragend="endDrag()"'+(touch?' onclick="startTouchSelect(meals.find(function(x){return x.id===\''+m.id+'\';}),\'meal\')"':''):'')
      +'><div style="flex:1;"><div class="search-result-name">'+highlight(m.name,q)+'</div>'
      +'<div class="search-result-meta">'+flagImg(c)+c.label+(used?' · ✓':'')+'</div></div>'
      +'<span class="search-result-type">meal</span><span class="cat-badge cat-'+m.cat+'">'+MEAL_CATS[m.cat]+'</span></div>');
  });
  ingMatches.forEach(function(i){
    rows.push('<div class="search-result-item" draggable="true" ondragstart="startDrag(\''+i.id+'\',\'ingredient\')" ondragend="endDrag()"'
      +(touch?' onclick="startTouchSelect(ingredients.find(function(x){return x.id===\''+i.id+'\';}),\'ingredient\')"':'')
      +'><div style="flex:1;"><div class="search-result-name">'+highlight(i.name,q)+'</div>'
      +'<div class="search-result-meta">'+(ING_CATS[i.cat]||i.cat)+'</div></div>'
      +'<span class="search-result-type">side</span></div>');
  });
  resultsEl.innerHTML='<div class="search-results">'+rows.join('')+'</div>';
}

function clearSearch(){ document.getElementById('meal-search').value=''; document.getElementById('search-results').innerHTML=''; document.getElementById('search-clear-btn').style.display='none'; }
