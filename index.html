// ─── SUPABASE LOAD ────────────────────────────────────────────────
async function loadFromDB(){
  try {
    const [mealsRes, weekRes, votesRes, histRes] = await Promise.all([
      db.from('meals').select('*'),
      db.from('week_plan').select('*, meals(*)'),
      db.from('votes').select('*'),
      db.from('history').select('*').order('saved_at', {ascending:false}),
    ]);
    if(mealsRes.data && mealsRes.data.length > 0){
      meals = mealsRes.data;
    } else {
      await seedMeals();
    }
    week = {};
    DAYS.forEach(d => week[d] = {meal: null, sides: []});
    if(weekRes.data){
      weekRes.data.forEach(row => {
        week[row.day] = { meal: row.meals || null, sides: row.sides || [] };
      });
    }
    votes = {};
    if(votesRes.data){
      votesRes.data.forEach(v => {
        if(!votes[v.meal_id]) votes[v.meal_id] = {};
        votes[v.meal_id][v.member_id] = v.value;
      });
    }
    history = histRes.data || [];
    setSynced();
    renderAll();
  } catch(e){
    setError();
    meals = DEFAULT_MEALS;
    DAYS.forEach(d => week[d] = {meal:null, sides:[]});
    renderAll();
  }
}

async function seedMeals(){
  const { error } = await db.from('meals').insert(DEFAULT_MEALS);

}

  setSyncing();
  const { error } = await db.from('meals').upsert(meal);
  if(error) setError(); else setSynced();
}
async function deleteMealFromDB(id){
  setSyncing();
  const { error } = await db.from('meals').delete().eq('id', id);
  if(error) setError(); else setSynced();
}
async function saveDayToDB(day){
  setSyncing();
  const { error } = await db.from('week_plan').upsert({
    day,
    meal_id: week[day].meal?.id || null,
    sides: week[day].sides || []
  });
  if(error) setError(); else setSynced();
}
async function saveVoteToDB(mealId, memberId, value){
  setSyncing();
  const { error } = await db.from('votes').upsert({meal_id: mealId, member_id: memberId, value});
  if(error) setError(); else setSynced();
}
async function saveHistoryToDB(entry){
  setSyncing();
  const { error } = await db.from('history').insert(entry);
  if(error) setError(); else setSynced();
}

// ─── TABS ─────────────────────────────────────────────────────────
function showTab(t){
  ['plan','vote','shop','history'].forEach((x,i)=>{
    document.getElementById('tab-'+x).style.display = x===t?'':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active', x===t);
  });
  if(t==='vote') renderVote();
  if(t==='shop') renderShop();
  if(t==='history') renderHistory();
}

function renderAll(){ renderSearch(); renderWeekGrid(); renderLib(); renderMembers(); renderSummary(); }

// ─── MEMBERS ──────────────────────────────────────────────────────
function renderMembers(){
  document.getElementById('member-grid').innerHTML = MEMBERS.map(m=>`
    <div class="member-card ${activeMember===m.id?'active':''}" onclick="setMember('${m.id}')">
      <div class="member-avatar" style="background:${m.color}22;color:${m.color};">${m.initials}</div>
      <div class="member-name">${m.name}</div>
    </div>`).join('');
}
function setMember(id){ activeMember=id; localStorage.setItem('peach_member',id); renderAll(); }

// ─── SEARCH ───────────────────────────────────────────────────────
function renderSearch(){
  const q = (document.getElementById('meal-search')?.value||'').toLowerCase().trim();
  const clearBtn = document.getElementById('search-clear-btn');
  const resultsEl = document.getElementById('search-results');
  if(clearBtn) clearBtn.style.display = q ? '' : 'none';
  if(!q){ resultsEl.innerHTML=''; return; }
  const assigned = new Set(DAYS.map(d=>week[d]?.meal?.id).filter(Boolean));
  const matches = meals.filter(m => m.name.toLowerCase().includes(q) || (m.protein||'').toLowerCase().includes(q));
  if(!matches.length){ resultsEl.innerHTML='<div class="search-results"><div class="search-empty">No meals found</div></div>'; return; }
  resultsEl.innerHTML = `<div class="search-results">${matches.map(m=>{
    const used = assigned.has(m.id); const c = getCuisine(m.cuisine);
    return `<div class="search-result-item ${used?'used':''}" ${!used?`draggable="true" ondragstart="startDrag('${m.id}','meal')" ondragend="endDrag()"`:''}>
      <div style="flex:1;"><div class="search-result-name"><strong>${m.name}</strong></div><div class="search-result-meta">${c.flag} ${c.label} · ${m.protein}${used?' · ✓':''}</div></div>
      <span class="cat-badge cat-${m.cat}">${MEAL_CATS[m.cat]}</span>
    </div>`;
  }).join('')}</div>`;
}
function clearSearch(){ document.getElementById('meal-search').value=''; document.getElementById('search-results').innerHTML=''; document.getElementById('search-clear-btn').style.display='none'; }

// ─── WEEK GRID ────────────────────────────────────────────────────
function renderWeekGrid(){
  document.getElementById('week-grid').innerHTML = DAYS.map(d => {
    const day = week[d]||{meal:null,sides:[]}; const meal = day.meal; const sides = day.sides||[];
    const c = meal ? getCuisine(meal.cuisine) : null;
    return `<div class="day-block ${meal?'has-meal':''}">
      <div class="day-header" id="meal-drop-${d}"
        ondragover="event.preventDefault();if(dragType==='meal')document.getElementById('meal-drop-${d}').classList.add('drag-over-meal')"
        ondragleave="document.getElementById('meal-drop-${d}').classList.remove('drag-over-meal')"
        ondrop="dropOnDay('${d}','meal')">
        <div class="day-name">${d}</div>
        ${meal?`
          <div style="flex:1;">
            <div class="day-meal-name">${meal.name}</div>
            <div class="day-meal-meta">${c.flag} ${c.label} · ${meal.protein}</div>
          </div>
          <span class="cat-badge cat-${meal.cat}">${MEAL_CATS[meal.cat]}</span>
          <button class="remove-btn" onclick="removeMeal('${d}')">×</button>
        `:`<div class="day-empty-meal">drag a meal here…</div>`}
      </div>
      <div class="day-sides" id="side-drop-${d}"
        ondragover="event.preventDefault();if(dragType==='ingredient')document.getElementById('side-drop-${d}').classList.add('drag-over-side')"
        ondragleave="document.getElementById('side-drop-${d}').classList.remove('drag-over-side')"
        ondrop="dropOnDay('${d}','side')">
        ${sides.length ? sides.map((s,i)=>`<span class="side-chip">${s.name}<button onclick="removeSide('${d}',${i})">×</button></span>`).join('') : '<span class="day-sides-empty">+ drop sides</span>'}
      </div>
    </div>`;
  }).join('');
}

async function dropOnDay(day, zone){
  document.getElementById('meal-drop-'+day)?.classList.remove('drag-over-meal');
  document.getElementById('side-drop-'+day)?.classList.remove('drag-over-side');
  if(!dragItem) return;
  if(!week[day]) week[day] = {meal:null, sides:[]};
  if(zone==='meal' && dragType==='meal'){ week[day].meal = dragItem; }
  else if(zone==='side' && dragType==='ingredient'){
    if(!week[day].sides.some(s=>s.id===dragItem.id)) week[day].sides.push(dragItem);
  }
  dragItem=null; dragType=null;
  renderAll();
  await saveDayToDB(day);
}
async function removeMeal(day){ week[day].meal=null; renderAll(); await saveDayToDB(day); }
async function removeSide(day,idx){ week[day].sides.splice(idx,1); renderAll(); await saveDayToDB(day); }

// ─── LIBRARY ──────────────────────────────────────────────────────
function setLibTab(t){
  libTab=t; editingId=null; confirmDeleteId=null; addOpen=false;
  document.getElementById('add-form-container').innerHTML='';
  document.getElementById('add-toggle').textContent='+ Add';
  document.getElementById('lib-tab-meals').classList.toggle('active',t==='meals');
  document.getElementById('lib-tab-ingredients').classList.toggle('active',t==='ingredients');
  renderLib();
}
function renderLib(){
  if(libTab==='meals'){
    document.getElementById('lib-count').textContent=`(${meals.length})`;
    document.getElementById('filter-row').innerHTML=`<button class="filter-btn ${cuisineFilter==='all'?'active':''}" onclick="setCuisineFilter('all')">All</button>`+CUISINES.map(c=>`<button class="filter-btn ${cuisineFilter===c.id?'active':''}" onclick="setCuisineFilter('${c.id}')">${c.flag}</button>`).join('');
    renderMealLib();
  } else {
    document.getElementById('lib-count').textContent=`(${ingredients.length})`;
    document.getElementById('filter-row').innerHTML=['all',...ING_CAT_ORDER].map(c=>`<button class="filter-btn ${ingFilter===c?'active':''}" onclick="setIngFilter('${c}')">${c==='all'?'All':ING_CATS[c]}</button>`).join('');
    renderIngLib();
  }
}
function setCuisineFilter(f){ cuisineFilter=f; renderLib(); }
function setIngFilter(f){ ingFilter=f; renderLib(); }

function renderMealLib(){
  const assigned = new Set(DAYS.map(d=>week[d]?.meal?.id).filter(Boolean));
  const list = meals.filter(m=>cuisineFilter==='all'||m.cuisine===cuisineFilter);
  let html='';
  ['fish','meat','veggie'].forEach(cat=>{
    const items=list.filter(m=>m.cat===cat); if(!items.length) return;
    html+=`<div class="cat-group-label">${MEAL_CATS[cat]}</div>`;
    items.forEach(m=>{
      const used=assigned.has(m.id),isE=editingId===m.id,isC=confirmDeleteId===m.id;
      const c=getCuisine(m.cuisine);
      const thumbs=Object.values(votes[m.id]||{}).filter(v=>v===1).length;
      html+=`<div class="meal-card ${isC?'confirming':isE?'editing':used?'used':''}" ${!used&&!isE&&!isC?`draggable="true" ondragstart="startDrag('${m.id}','meal')" ondragend="endDrag()"`:''}>
        <div class="item-top">
          <div class="item-name">${m.name}</div>
          <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;">
            ${thumbs>0?`<span style="font-size:10px;color:#999;margin-right:2px;">👍${thumbs}</span>`:''}
            ${used?`<span style="font-size:10px;color:#999;margin-right:2px;">✓</span>`:''}
            ${!isC?`<button class="icon-btn" onclick="toggleEdit('${m.id}')">✏</button><button class="icon-btn delete" onclick="askDelete('${m.id}')">🗑</button>`:`<button class="icon-btn" onclick="cancelDelete()">✕</button>`}
          </div>
        </div>
        <div class="item-meta"><span>${c.flag}</span><span>${c.label}</span><span style="color:#ddd;">·</span><span>${m.protein}</span></div>
        ${isC?`<div class="delete-confirm"><span>Remove "${m.name}"?</span><div style="display:flex;gap:4px;"><button class="btn btn-sm btn-danger" onclick="confirmDeleteItem('meal','${m.id}')">Yes</button><button class="btn btn-sm" onclick="cancelDelete()">No</button></div></div>`:''}
        ${isE?renderMealEditForm(m):''}
      </div>`;
    });
  });
  document.getElementById('lib-list').innerHTML=html||'<div class="empty-state">No meals yet — add yours!</div>';
}

function renderIngLib(){
  const list=ingredients.filter(i=>ingFilter==='all'||i.cat===ingFilter);
  let html='';
  ING_CAT_ORDER.forEach(cat=>{
    const items=list.filter(i=>i.cat===cat); if(!items.length) return;
    html+=`<div class="cat-group-label">${ING_CATS[cat]}</div>`;
    items.forEach(i=>{
      const isE=editingId===i.id,isC=confirmDeleteId===i.id;
      html+=`<div class="ing-card ${isC?'confirming':isE?'editing':''}" ${!isE&&!isC?`draggable="true" ondragstart="startDrag('${i.id}','ingredient')" ondragend="endDrag()"`:''}>
        <div class="item-top"><div class="item-name">${i.name}</div>
          <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;">
            ${!isC?`<button class="icon-btn" onclick="toggleEdit('${i.id}')">✏</button><button class="icon-btn delete" onclick="askDelete('${i.id}')">🗑</button>`:`<button class="icon-btn" onclick="cancelDelete()">✕</button>`}
          </div>
        </div>
        <div class="item-meta">${ING_CATS[i.cat]||i.cat}</div>
        ${isC?`<div class="delete-confirm"><span>Remove "${i.name}"?</span><div style="display:flex;gap:4px;"><button class="btn btn-sm btn-danger" onclick="confirmDeleteItem('ingredient','${i.id}')">Yes</button><button class="btn btn-sm" onclick="cancelDelete()">No</button></div></div>`:''}
        ${isE?renderIngEditForm(i):''}
      </div>`;
    });
  });
  document.getElementById('lib-list').innerHTML=html||'<div class="empty-state">No ingredients match</div>';
}

function renderMealEditForm(m){return `<div class="inline-form info">
  <div class="form-row full"><input type="text" id="edit-name" value="${m.name}"></div>
  <div class="form-row"><select id="edit-cat">${Object.entries(MEAL_CATS).map(([v,l])=>`<option value="${v}" ${m.cat===v?'selected':''}>${l}</option>`).join('')}</select><input type="text" id="edit-protein" value="${m.protein||''}" placeholder="Protein"></div>
  <div class="form-row full"><select id="edit-cuisine">${CUISINES.map(c=>`<option value="${c.id}" ${m.cuisine===c.id?'selected':''}>${c.flag} ${c.label}</option>`).join('')}</select></div>
  <div style="display:flex;gap:5px;"><button class="btn btn-primary btn-sm" style="flex:1;" onclick="saveMealEdit('${m.id}')">Save</button><button class="btn btn-sm" onclick="cancelEdit()">Cancel</button></div>
</div>`;}
function renderIngEditForm(i){return `<div class="inline-form info">
  <div class="form-row full"><input type="text" id="edit-name" value="${i.name}"></div>
  <div class="form-row full"><select id="edit-cat">${ING_CAT_ORDER.map(c=>`<option value="${c}" ${i.cat===c?'selected':''}>${ING_CATS[c]}</option>`).join('')}</select></div>
  <div style="display:flex;gap:5px;"><button class="btn btn-primary btn-sm" style="flex:1;" onclick="saveIngEdit('${i.id}')">Save</button><button class="btn btn-sm" onclick="cancelEdit()">Cancel</button></div>
</div>`;}

function toggleEdit(id){ editingId=editingId===id?null:id; confirmDeleteId=null; addOpen=false; document.getElementById('add-form-container').innerHTML=''; document.getElementById('add-toggle').textContent='+ Add'; renderLib(); }
function cancelEdit(){ editingId=null; renderLib(); }
function askDelete(id){ confirmDeleteId=id; editingId=null; renderLib(); }
function cancelDelete(){ confirmDeleteId=null; renderLib(); }

async function confirmDeleteItem(type, id){
  if(type==='meal'){
    meals=meals.filter(m=>m.id!==id);
    DAYS.forEach(d=>{ if(week[d]?.meal?.id===id){ week[d].meal=null; saveDayToDB(d); } });
    await deleteMealFromDB(id);
  } else {
    ingredients=ingredients.filter(i=>i.id!==id);
    DAYS.forEach(d=>{ if(week[d]?.sides?.some(s=>s.id===id)){ week[d].sides=week[d].sides.filter(s=>s.id!==id); saveDayToDB(d); } });
    localStorage.setItem('peach_ingredients', JSON.stringify(ingredients));
  }
  confirmDeleteId=null; renderAll();
}

async function saveMealEdit(id){
  const idx=meals.findIndex(m=>m.id===id); if(idx===-1) return;
  meals[idx]={...meals[idx], name:document.getElementById('edit-name').value.trim()||meals[idx].name, cat:document.getElementById('edit-cat').value, protein:document.getElementById('edit-protein').value||meals[idx].protein, cuisine:document.getElementById('edit-cuisine').value};
  DAYS.forEach(d=>{ if(week[d]?.meal?.id===id){ week[d].meal=meals[idx]; saveDayToDB(d); } });
  await saveMealToDB(meals[idx]);
  editingId=null; renderAll();
}
async function saveIngEdit(id){
  const idx=ingredients.findIndex(i=>i.id===id); if(idx===-1) return;
  ingredients[idx]={...ingredients[idx], name:document.getElementById('edit-name').value.trim()||ingredients[idx].name, cat:document.getElementById('edit-cat').value};
  DAYS.forEach(d=>{ if(week[d]?.sides) week[d].sides=week[d].sides.map(s=>s.id===id?ingredients[idx]:s); });
  localStorage.setItem('peach_ingredients', JSON.stringify(ingredients));
  editingId=null; renderAll();
}

function startDrag(id,type){ dragType=type; dragItem=type==='meal'?meals.find(m=>m.id===id):ingredients.find(i=>i.id===id); }
function endDrag(){ dragItem=null; dragType=null; document.querySelectorAll('.day-header,.day-sides').forEach(el=>el.classList.remove('drag-over-meal','drag-over-side')); }

function renderSummary(){
  const m=DAYS.map(d=>week[d]?.meal).filter(Boolean);
  const s=DAYS.reduce((acc,d)=>acc+(week[d]?.sides?.length||0),0);
  if(!m.length&&!s){ document.getElementById('summary-bar').innerHTML=''; return; }
  const chips=[m.length?`${m.length}/5 meals`:'',...Object.entries(MEAL_CATS).map(([k,l])=>{const n=m.filter(x=>x.cat===k).length;return n?`${n} ${l.toLowerCase()}`:'';}).filter(Boolean),s?`${s} sides`:''].filter(Boolean);
  document.getElementById('summary-bar').innerHTML=chips.map(c=>`<span class="summary-chip">${c}</span>`).join('');
}

async function autoFill(){
  const pool=[...meals].sort(()=>Math.random()-0.5);
  const fish=pool.filter(m=>m.cat==='fish'), other=pool.filter(m=>m.cat!=='fish');
  const picks=[...fish.slice(0,2),...other].slice(0,5);
  DAYS.forEach((d,i)=>{ if(!week[d]) week[d]={meal:null,sides:[]}; week[d].meal=picks[i]||null; });
  renderAll();
  await Promise.all(DAYS.map(d=>saveDayToDB(d)));
}
async function clearWeek(){
  DAYS.forEach(d=>{ if(!week[d]) week[d]={meal:null,sides:[]}; week[d].meal=null; week[d].sides=[]; });
  renderAll();
  await Promise.all(DAYS.map(d=>saveDayToDB(d)));
}
async function saveToHistory(){
  const m=DAYS.map(d=>week[d]?.meal).filter(Boolean); if(!m.length) return;
  const entry={ week_label:`Week of ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`, meals:m.map(x=>x.name), sides:DAYS.reduce((acc,d)=>{ if(week[d]?.sides?.length) acc[d]=week[d].sides.map(s=>s.name); return acc; },{}) };
  history.unshift(entry);
  await saveHistoryToDB(entry);
  await clearWeek();
  showToast('Week saved to history! 🎉');
}

function toggleAddForm(){
  addOpen=!addOpen; editingId=null; confirmDeleteId=null;
  document.getElementById('add-toggle').textContent=addOpen?'✕':'+ Add';
  const el=document.getElementById('add-form-container');
  if(!addOpen){ el.innerHTML=''; renderLib(); return; }
  if(libTab==='meals'){
    el.innerHTML=`<div class="inline-form" style="margin-top:8px;">
      <div class="form-row full"><input type="text" id="new-name" placeholder="Meal name"></div>
      <div class="form-row"><select id="new-cat">${Object.entries(MEAL_CATS).map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select><input type="text" id="new-protein" placeholder="Protein"></div>
      <div class="form-row full"><select id="new-cuisine">${CUISINES.map(c=>`<option value="${c.id}">${c.flag} ${c.label}</option>`).join('')}</select></div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="addMeal()">Add meal</button>
    </div>`;
  } else {
    el.innerHTML=`<div class="inline-form" style="margin-top:8px;">
      <div class="form-row full"><input type="text" id="new-name" placeholder="e.g. Edamame"></div>
      <div class="form-row full"><select id="new-cat">${ING_CAT_ORDER.map(c=>`<option value="${c}">${ING_CATS[c]}</option>`).join('')}</select></div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="addIngredient()">Add ingredient</button>
    </div>`;
  }
}
async function addMeal(){
  const name=document.getElementById('new-name').value.trim(); if(!name) return;
  const meal={id:'u'+Date.now(), name, cat:document.getElementById('new-cat').value, protein:document.getElementById('new-protein').value||'—', cuisine:document.getElementById('new-cuisine').value};
  meals.push(meal);
  await saveMealToDB(meal);
  addOpen=false; document.getElementById('add-form-container').innerHTML=''; document.getElementById('add-toggle').textContent='+ Add';
  renderAll(); showToast(`${name} added! 🍽️`);
}
function addIngredient(){
  const name=document.getElementById('new-name').value.trim(); if(!name) return;
  const ing={id:'i'+Date.now(), name, cat:document.getElementById('new-cat').value};
  ingredients.push(ing);
  localStorage.setItem('peach_ingredients', JSON.stringify(ingredients));
  addOpen=false; document.getElementById('add-form-container').innerHTML=''; document.getElementById('add-toggle').textContent='+ Add';
  renderAll(); showToast(`${name} added!`);
}

function renderShop(){
  const el=document.getElementById('shop-list');
  const m=DAYS.map(d=>week[d]?.meal).filter(Boolean);
  const allSides=DAYS.flatMap(d=>week[d]?.sides||[]);
  if(!m.length&&!allSides.length){ el.innerHTML='<div class="empty-state">Plan your week first — your shopping list appears here automatically.</div>'; return; }
  let html='';
  if(m.length) html+=`<div class="shop-group"><div class="shop-group-label">Meals to prepare</div><div class="shop-items">${m.map(x=>`<span class="shop-item meal-item">${getCuisine(x.cuisine).flag} ${x.name}</span>`).join('')}</div></div>`;
  const byCat={};
  allSides.forEach(s=>{ if(!byCat[s.cat]) byCat[s.cat]=[]; if(!byCat[s.cat].find(x=>x.id===s.id)) byCat[s.cat].push(s); });
  ING_CAT_ORDER.forEach(cat=>{ if(!byCat[cat]?.length) return; html+=`<div class="shop-group"><div class="shop-group-label">${ING_CATS[cat]}</div><div class="shop-items">${byCat[cat].map(s=>`<span class="shop-item">${s.name}</span>`).join('')}</div></div>`; });
  el.innerHTML=html;
}

function renderVote(){
  document.getElementById('voter-selector').innerHTML=MEMBERS.map(m=>`<button class="filter-btn ${activeMember===m.id?'active':''}" onclick="setMember('${m.id}');renderVote();" style="font-size:11px;">${m.name}</button>`).join('');
  document.getElementById('vote-list').innerHTML=meals.map(m=>{
    const myVote=(votes[m.id]||{})[activeMember];
    const total=Object.values(votes[m.id]||{}).filter(v=>v===1).length;
    const c=getCuisine(m.cuisine);
    return `<div class="vote-row">
      <div><div style="font-size:13px;">${m.name}</div><div style="font-size:11px;color:#888;">${c.flag} ${c.label} · ${total} 👍</div></div>
      <div style="display:flex;gap:5px;"><button class="vote-btn up ${myVote===1?'voted':''}" onclick="castVote('${m.id}',1)">👍</button><button class="vote-btn down ${myVote===-1?'voted':''}" onclick="castVote('${m.id}',-1)">👎</button></div>
    </div>`;
  }).join('');
}
async function castVote(mealId,val){
  if(!votes[mealId]) votes[mealId]={};
  votes[mealId][activeMember] = votes[mealId][activeMember]===val ? 0 : val;
  renderVote(); renderLib();
  await saveVoteToDB(mealId, activeMember, votes[mealId][activeMember]);
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!history.length){ el.innerHTML='<div class="empty-state">No saved weeks yet.</div>'; return; }
  el.innerHTML=history.map(h=>`<div class="history-row">
    <div style="font-size:11px;color:#999;margin-bottom:2px;">${h.week_label||h.week||''}</div>
    <div style="font-size:13px;">${(h.meals||[]).join(' · ')}</div>
    ${h.sides&&Object.keys(h.sides).length?`<div style="font-size:11px;color:#aaa;margin-top:2px;">${Object.entries(h.sides).map(([d,s])=>`${d}: ${s.join(', ')}`).join(' · ')}</div>`:''}
  </div>`).join('');
}

// ─── INIT ─────────────────────────────────────────────────────────
loadFromDB();
</script>
